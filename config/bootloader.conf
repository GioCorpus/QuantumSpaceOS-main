# QuantumSpaceOS Bootloader Configuration (GRUB)
#
# Controls GRUB menu appearance and boot parameters.
# This file is packaged into the ISO as boot/grub/grub.cfg.

# Timeout (seconds) before auto-boot default entry
GRUB_TIMEOUT=5

# Default entry (0-indexed)
GRUB_DEFAULT=0

# Background image (920x540 png from docs/)
#GRUB_BACKGROUND="/boot/grub/background.png"

# Theme (optional)
#GRUB_THEME="/boot/grub/theme.txt"

# Resolution
GRUB_GFXMODE=auto
#GRUB_GFXPAYLOAD_LINUX=keep

# Normal / fallback entry labels
GRUB_SAVEDEFAULT=true

# Hide menu if single entry and not holding shift
GRUB_HIDDEN_TIMEOUT=0
GRUB_HIDDEN_TIMEOUT_QUIET=true

# Distro name shown in recovery menu
GRUB_DISTRIBUTOR="QuantumSpaceOS"

# Disable submenu
GRUB_DISABLE_SUBMENU=y

# Recovery mode label
GRUB_CMDLINE_LINUX_RECOVERY="quiet"

# Kernel command line parameters
GRUB_CMDLINE_LINUX="quiet splash loglevel=3"

# Disable OS prober (no other OS detection)
GRUB_DISABLE_OS_PROBER=true

# Serial console (for embedded)
#GRUB_SERIAL_COMMAND="serial"

# ---- Custom menu entries ----
# The build script assembles grub.cfg using these options plus
# a fixed entry that boots into the QuantumSpaceOS live environment.
