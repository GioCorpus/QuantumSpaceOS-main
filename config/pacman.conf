# pacman.conf for QuantumSpaceOS ISO build
#
# This configuration is used during ISO construction with archiso.
# It defines package repositories and options for the target system.

[options]
RootDir     = /mnt
DBPath      = /var/lib/pacman/
CacheDir    = /var/cache/pacman/pkg/
LogFile     = /var/log/pacman.log
GPGDir      = /etc/pacman.d/gnupg/
HookDir     = /usr/share/libalpm/hooks/
HoldPkg     = pacman glibc
Architecture = auto

# Do not use color in logs
Color

# No progress bar by default (speed up script usage)
#ProgressBar

# Use a local package cache (iso/packages)
#CacheDir = /var/cache/pacman/pkg/

# Check for package conflicts
CheckSpace

# Use syslog for logging (preferred for embedded)
#Syslog

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[community]
Include = /etc/pacman.d/mirrorlist

# QuantumSpaceOS custom repository (local packages)
#[quantumspace]
#Server = file:///root/packages
#SigLevel = Optional
