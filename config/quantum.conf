# QuantumSpaceOS Quantum Configuration File
#
# Controls quantum core behavior, photonic bridge parameters,
# and integration with flight systems.

[quantum_core]
# Number of simulated qubits in core
qubit_count = 8

# Enable Q# integration if .NET SDK present
enable_qsharp = false

# Default algorithm mode
# options: grover, qft, vqe, custom
algorithm = "grover"

# Coherence time simulation (microseconds)
coherence_time_us = 1000

# Error rate per gate (simulated)
gate_error_rate = 0.001

[photonic_bridge]
# Photonic channel bandwidth (GHz)
bandwidth_ghz = 100

# Attenuation (dB/km)
attenuation_db_per_km = 0.2

# Wavelength for photonic encoding (nm)
wavelength_nm = 1550

# Use entanglement swapping across network nodes
entanglement_swapping = true

# Quantum bit error rate threshold (trigger re-transmit)
qber_threshold = 0.05

[flight_integration]
# Enable quantum-assisted orbital calculation
quantum_navigation = true

# Update frequency (Hz)
update_rate_hz = 10

# Attitude control quantum correction (experimental)
quantum_acs = false

[telemetry]
# Port for telemetry API
api_port = 8080

# Broadcast interval (ms)
broadcast_interval_ms = 100

# Log telemetry to disk
log_to_disk = true
log_path = "/var/log/quantumspaceos/telemetry.log"

[logging]
# Log level: trace, debug, info, warn, error
level = "info"

# Log to file
file_logging = true
log_file = "/var/log/quantumspaceos/system.log"

# Log rotation max size (MB)
max_size_mb = 10
# Keep count of rotated logs
max_files = 5

[system]
# System timezone
timezone = "UTC"

# NTP sync on boot
ntp_sync = true

# Service names to start on boot
services = [
    "quantumspace-telemetry",
    "quantumspace-gui",
    "photonic-bridge"
]
