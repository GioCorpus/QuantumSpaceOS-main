# Wayland Compositor Configuration for QuantumSpaceOS
#
# This configuration applies to the Wayland compositor used by the
# minimal desktop environment. The compositor is to be determined
# (Sway, River, or custom smithay-based).
#
# Currently these are placeholder settings.

[global]
# Background color (hex)
background = "#070A14"

# Cursor theme
cursor_theme = "Adwaita"
cursor_size = 24

# Font
font = "DejaVu Sans Mono 10"

# Output configuration
[output]
# Output name (auto-detected)
# name = "*"
# Mode (resolution) - auto
# mode = "auto"
# Position (x, y)
# pos = "0,0"
# Scale factor
# scale = 1

# Seat configuration
[seat]
# Default seat
# name = "seat0"
# Allow users in "wheel" group to manage
# allow_active_users = true

# Keyboard layout
[keyboard]
# Keymap layout
layout = "us"
# Variant
variant = ""
# Options (e.g., caps:escape)
options = ""

# Client behavior
[client]
# Focus mode: click or follow-mouse
focus = "click"
# Double-click time (ms)
double_click_time = 300
# Double-click distance (pixels)
double_click_distance = 5

# Window rules (placeholder)
[window]
# Fullscreen preference
fullscreen = true

# Animations
[animations]
# Enable animations (may be disabled for low-power)
enabled = false

# Quantum HUD overlay
[quantumhud]
# Show quantum state overlay
enabled = true
# Position: top-left, top-right, bottom-left, bottom-right
position = "top-left"
# Update interval (ms)
interval = 100

# Performance
[performance]
# Swap interval (vsync): 1 = 60Hz on 60Hz display
# swap_interval = 1
# CPU governor on battery: powersave, performance
# cpu_governor = "powersave"
