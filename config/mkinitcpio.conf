# mkinitcpio configuration for QuantumSpaceOS
#
# This config is used to generate the initramfs that boots the ISO.
# It includes modules for quantum-specific hardware (placeholder) and standard storage.

MODULES=()
BINARIES=()
FILES=()

# Compress with zstd (fast)
COMPRESSION="zstd"
COMPRESSION_LEVEL="19"

# Hook scripts execute in order
HOOKS=(base udev autodetect modconf block keyboard keymap consolefont encrypt lvm2 resume filesystems fsck shmacroboot)

# For quantum hardware support, a custom hook would load drivers
# HOOKS=(base udev autodetect modconf quantum_hw ...)

# Special files to embed
#FILES=(/etc/quantum.conf)

# Binary dependencies
#BINARIES=(/usr/bin/quantumctl)

# Additional modules (if needed)
#MODULES=(nvme xhci_pci)

# Keyboard layout (US)
KEYMAP="us"
FONT="lat9w-16"

# Quiet boot
QUIET=1

# Dev space
#DEVICE=
#MAP=
#FSTYPE=
#OPTIONS=
